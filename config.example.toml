[server]
bind_host = "127.0.0.1"
port = 3000
dist_dir = "dist"

[auth]
username = "admin"
password = "change-me"
# Set true for local development; Basic auth is still required.
# This only disables HTTPS enforcement.
development = true
# Set true in production when nginx forwards HTTPS traffic and sends X-Forwarded-Proto.
require_https = false

[frontend]
# Leave empty when frontend and backend are served by the same public origin.
# Set this for split local dev, for example "http://127.0.0.1:3000".
# Set this to a same-origin reverse-proxy prefix, for example "/ap",
# when nginx maps that prefix to the backend.
backend_public_url = ""

[database]
url = "postgres://conference_user:conference_password@localhost:5432/conference_registration"
max_connections = 5

[verifier_api]
base_url = "http://127.0.0.1:3001"
auth_token = "replace-me"
